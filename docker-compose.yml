# ========================================
# SmartDrobe — Docker Compose
# For local development and testing
# ========================================

version: '3.8'

services:
  smartdrobe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartdrobe-app
    ports:
      - "3000:3000"
    environment:
      # ⚠️ IMPORTANT: Set these via .env file or pass them at runtime
      # NEVER hardcode secrets in docker-compose.yml
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - NEXT_PUBLIC_OPENWEATHER_API_KEY=${NEXT_PUBLIC_OPENWEATHER_API_KEY}
      - DEFAULT_CITY=${DEFAULT_CITY:-London}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # Mount logs directory for persistence
      - ./logs:/app/logs
    networks:
      - smartdrobe-network

networks:
  smartdrobe-network:
    driver: bridge
